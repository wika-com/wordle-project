apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordle-cache
  namespace: wordle-game
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordle-cache
  template:
    metadata:
      labels:
        app: wordle-cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379 # stąd backend możę brać dane
        resources: # limity zasobów
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
