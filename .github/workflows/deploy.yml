name: CI/CD Pipeline
 
on:
  push:
    branches: [ main ]
 
env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
 
jobs:
  #budowanie obrazów (2)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.29.0'

        #testy
    - name: Validate k8s manifests
      run: |
        kubectl apply --dry-run=client --validate=false -f k8s/namespace.yaml
        kubectl apply --dry-run=client --validate=false -f k8s/configmap.yaml
        kubectl apply --dry-run=client --validate=false -f k8s/secrets.yaml
        kubectl apply --dry-run=client --validate=false -f k8s/db-statefulset.yaml
        kubectl apply --dry-run=client --validate=false -f k8s/redis.yaml
        kubectl apply --dry-run=client --validate=false -f k8s/services.yaml
        kubectl apply --dry-run=client --validate=false -f k8s/backend-deployment.yaml
        kubectl apply --dry-run=client --validate=false -f k8s/frontend-deployment.yaml
        kubectl apply --dry-run=client --validate=false -f k8s/ingress.yaml
 
      # publikuje obraz w rejestrze
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
 
    - name: Build and Push backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/wordle-backend:latest
 
    - name: Build and Push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/wordle-frontend:latest
 
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
 
    - name: Create local KinD Cluster
      uses: helm/kind-action@v1.10.0

# deploy przez kubectl - stawia w chmurze klaster ze strukturą k8s
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/namespace.yaml
        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/secrets.yaml
        kubectl apply -f k8s/db-statefulset.yaml
        kubectl apply -f k8s/redis.yaml
        kubectl apply -f k8s/services.yaml
        kubectl apply -f k8s/backend-deployment.yaml
        kubectl apply -f k8s/frontend-deployment.yaml
        kubectl apply -f k8s/ingress.yaml
    
    - name: Debug frontend pod
      run: |
        kubectl describe pod -l app=wordle-frontend -n wordle-game
        kubectl logs -l app=wordle-frontend -n wordle-game --previous || true

      # sprawdzenie rollout
    - name: Verify Rollout Status
      run: |
        kubectl rollout status deployment/wordle-backend -n wordle-game --timeout=120s
        kubectl rollout status deployment/wordle-frontend -n wordle-game --timeout=120s

    - name: Smoke test
      run: |
        kubectl run smoke-test --image=curlimages/curl:8.5.0 \
          --restart=Never --rm -it \
          -n wordle-game \
          -- curl -sf http://wordle-backend-svc:3000/health